# Minimal stub of the aura-os workspace root used during Docker builds.
#
# aura-harness depends on `aura-protocol` via a path dependency in
# ../aura-os/crates/aura-protocol. That crate's Cargo.toml inherits keys from
# its workspace root (edition, rust-version, license, repository, lints, and
# a couple of workspace.dependencies entries).
#
# Copying the real aura-os Cargo.toml would require pulling in ~20 unrelated
# crates. Instead, this stub provides just enough workspace metadata for
# `aura-protocol` to resolve its `.workspace = true` inheritance.
#
# Keep this in sync with C:/code/aura-os/Cargo.toml if aura-protocol starts
# inheriting new keys from the workspace.

[workspace]
members = ["crates/aura-protocol"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.80.0"
license = "MIT"
repository = "https://github.com/aura/aura-os"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "warn"
