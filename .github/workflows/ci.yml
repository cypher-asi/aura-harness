name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------------
  # Format check
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aura-harness

      # aura-harness depends on the sibling `aura-os` repo for the
      # `aura-protocol` crate via a `../aura-os/crates/aura-protocol` path
      # dependency. CI must check out that sibling at `../aura-os` relative to
      # `aura-harness`.
      - name: Checkout aura-os sibling
        uses: actions/checkout@v4
        with:
          repository: cypher-asi/aura-os
          path: aura-os

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        working-directory: aura-harness
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aura-harness

      - name: Checkout aura-os sibling
        uses: actions/checkout@v4
        with:
          repository: cypher-asi/aura-os
          path: aura-os

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aura-harness

      - name: cargo clippy
        working-directory: aura-harness
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aura-harness

      - name: Checkout aura-os sibling
        uses: actions/checkout@v4
        with:
          repository: cypher-asi/aura-os
          path: aura-os

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aura-harness

      - name: cargo test
        working-directory: aura-harness
        run: cargo test --workspace --all-features

  # ---------------------------------------------------------------------------
  # MSRV (Minimum Supported Rust Version) check — must match
  # `rust-version` in the workspace Cargo.toml.
  # ---------------------------------------------------------------------------
  msrv:
    name: cargo check (MSRV 1.80.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aura-harness

      - name: Checkout aura-os sibling
        uses: actions/checkout@v4
        with:
          repository: cypher-asi/aura-os
          path: aura-os

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@1.80.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aura-harness
          key: msrv-1.80.0

      - name: cargo check --workspace --locked (MSRV)
        working-directory: aura-harness
        run: cargo check --workspace --all-targets --locked

  # ---------------------------------------------------------------------------
  # License / dependency policy
  # ---------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aura-harness

      - name: Checkout aura-os sibling
        uses: actions/checkout@v4
        with:
          repository: cypher-asi/aura-os
          path: aura-os

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aura-harness

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        working-directory: aura-harness
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # Security advisories (informational — Wave 0 relaxes this so upstream
  # advisories don't hard-block builds. Revisit when W5 lands.)
  # ---------------------------------------------------------------------------
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: aura-harness

      - name: Checkout aura-os sibling
        uses: actions/checkout@v4
        with:
          repository: cypher-asi/aura-os
          path: aura-os

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aura-harness

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: aura-harness
        run: cargo audit
